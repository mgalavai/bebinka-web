<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Lena Zyskina - Visual Artist</title>
    <meta name="description"
        content="Dive into my 15+ year artistic journey, displaying a diverse selection of works inspired by global techniques, with pieces exhibited worldwide and in private collections.">
    <link rel="canonical" id="canonical-link" href="https://bebinka.com/">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Lena Zyskina - Visual Artist">
    <meta property="og:description"
        content="Dive into my 15+ year artistic journey, displaying a diverse selection of works inspired by global techniques, with pieces exhibited worldwide and in private collections.">
    <meta property="og:image" content="https://framerusercontent.com/assets/2fhBqaQe3tq808c18cSGkyBVk.jpg">
    <meta property="og:url" id="og-url" content="https://bebinka.com/">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Lena Zyskina - Visual Artist">
    <meta name="twitter:description"
        content="Dive into my 15+ year artistic journey, displaying a diverse selection of works inspired by global techniques, with pieces exhibited worldwide and in private collections.">
    <meta name="twitter:image" content="https://framerusercontent.com/assets/2fhBqaQe3tq808c18cSGkyBVk.jpg">

    <!-- Favicon -->
    <link rel="icon" href="https://framerusercontent.com/images/3VX3MVpzaREdknX3qLuRaBVrA.gif">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            background: #f4f4f4;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>
    <iframe id="framer-site"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen
        loading="eager"></iframe>
    <script>
        (function () {
            var siteOrigin = window.location.origin;
            var framerOrigin = "https://exciting-support-013821.framer.app";
            var iframe = document.getElementById("framer-site");
            var params = new URLSearchParams(window.location.search);
            var forwardedPath = params.get("framer_path");

            function normalizeRoute(route) {
                if (!route) return "/";
                var normalized = route.trim();
                if (!normalized.startsWith("/")) {
                    normalized = "/" + normalized;
                }
                if (normalized.startsWith("//")) {
                    normalized = "/" + normalized.replace(/^\/+/, "");
                }
                return normalized;
            }

            var currentRoute = window.location.pathname + window.location.search + window.location.hash;
            var route = normalizeRoute(forwardedPath || currentRoute);
            var framerUrl = new URL(route, framerOrigin).toString();

            if (forwardedPath) {
                window.history.replaceState({}, "", route);
            }

            var canonical = document.getElementById("canonical-link");
            var ogUrl = document.getElementById("og-url");
            var publicUrl = new URL(route, siteOrigin).toString();
            canonical.setAttribute("href", publicUrl);
            ogUrl.setAttribute("content", publicUrl);

            iframe.src = framerUrl;
        })();
    </script>
</body>

</html>
